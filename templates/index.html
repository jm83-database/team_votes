<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 프로젝트 투표 시스템</title>
    <link rel="icon" type="image/png" href="/static/elixerr logo_resize.png">
    <link rel="shortcut icon" type="image/png" href="/static/elixerr logo_resize.png">
    <link rel="apple-touch-icon" href="/static/elixerr logo_resize.png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .vote-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .vote-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        .vote-card.selected {
            border-color: #3B82F6;
            background-color: #EBF8FF;
        }
        .vote-button {
            transition: all 0.3s ease;
        }
        .vote-button:hover {
            transform: scale(1.05);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .countdown-timer {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        /* Drag & Drop styles */
        .drag-over {
            border-color: #6366f1 !important;
            background-color: #eef2ff !important;
        }
        .dragging {
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div id="app"></div>
    <script type="text/babel" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
